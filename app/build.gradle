plugins {
    id 'com.android.application'
}

android {
    compileSdk 33
    namespace 'com.tetris.random'

    defaultConfig {
        applicationId "com.tetris.random"
        minSdk 21
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
        debug {
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
}
